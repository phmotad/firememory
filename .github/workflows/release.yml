name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.24"
  ORT_VERSION: "1.20.0"
  TOKENIZERS_VERSION: "1.27.0"

jobs:
  # ── Linux: fmem (amd64+arm64) + fquery (amd64+arm64, CGO) ──────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install cross-compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Download ORT (linux)
        run: bash scripts/download-ort.sh
        env:
          ORT_VERSION: ${{ env.ORT_VERSION }}

      - name: Download libtokenizers (linux)
        run: bash scripts/download-tokenizers.sh

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          LDFLAGS="-s -w -X github.com/phmotad/firememory/internal/version.Version=${VERSION}"

          mkdir -p bin/linux_amd64 bin/linux_arm64

          # fmem — no CGO, cross-compile freely
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -ldflags "${LDFLAGS}" -o bin/linux_amd64/fmem ./cmd/fmem
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 \
            go build -ldflags "${LDFLAGS}" -o bin/linux_arm64/fmem ./cmd/fmem

          # fquery linux/amd64 — CGO, native
          CGO_ENABLED=1 \
            CGO_LDFLAGS="-L$(pwd)/tokenizers-lib/linux-amd64" \
            GOOS=linux GOARCH=amd64 \
            go build -tags onnx -ldflags "${LDFLAGS}" \
              -o bin/linux_amd64/fquery ./cmd/fquery

          # fquery linux/arm64 — CGO, cross
          CGO_ENABLED=1 \
            CC=aarch64-linux-gnu-gcc \
            CXX=aarch64-linux-gnu-g++ \
            CGO_LDFLAGS="-L$(pwd)/tokenizers-lib/linux-aarch64" \
            GOOS=linux GOARCH=arm64 \
            go build -tags onnx -ldflags "${LDFLAGS}" \
              -o bin/linux_arm64/fquery ./cmd/fquery

      - name: Pack archives
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p archives

          for ARCH in amd64 arm64; do
            NAME="firememory_${VERSION}_linux_${ARCH}"
            mkdir -p "staging/${NAME}"
            cp bin/linux_${ARCH}/fmem   "staging/${NAME}/"
            cp bin/linux_${ARCH}/fquery "staging/${NAME}/"
            cp ort-lib/linux/libonnxruntime.so "staging/${NAME}/"
            cp LICENSE README.md "staging/${NAME}/"
            tar -czf "archives/${NAME}.tar.gz" -C staging "${NAME}"
          done

      # Save fquery linux/amd64 binary for the Docker build later
      - uses: actions/upload-artifact@v4
        with:
          name: fquery-linux-amd64
          path: bin/linux_amd64/fquery

      - uses: actions/upload-artifact@v4
        with:
          name: archives-linux
          path: archives/

  # ── macOS: fmem (arm64+amd64) + fquery (arm64+amd64, CGO) ─────────────────
  build-darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up clang wrapper for darwin/amd64
        run: |
          printf '#!/bin/sh\nexec clang -arch x86_64 "$@"\n' \
            > /usr/local/bin/cc-x86_64
          chmod +x /usr/local/bin/cc-x86_64

      - name: Download ORT (darwin)
        run: bash scripts/download-ort.sh
        env:
          ORT_VERSION: ${{ env.ORT_VERSION }}

      - name: Download libtokenizers (darwin)
        run: bash scripts/download-tokenizers.sh

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          LDFLAGS="-s -w -X github.com/phmotad/firememory/internal/version.Version=${VERSION}"

          mkdir -p bin/darwin_arm64 bin/darwin_amd64

          # fmem — no CGO
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 \
            go build -ldflags "${LDFLAGS}" -o bin/darwin_arm64/fmem ./cmd/fmem
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 \
            go build -ldflags "${LDFLAGS}" -o bin/darwin_amd64/fmem ./cmd/fmem

          # fquery darwin/arm64 — CGO, native M1
          CGO_ENABLED=1 \
            CGO_LDFLAGS="-L$(pwd)/tokenizers-lib/darwin-arm64" \
            GOOS=darwin GOARCH=arm64 \
            go build -tags onnx -ldflags "${LDFLAGS}" \
              -o bin/darwin_arm64/fquery ./cmd/fquery

          # fquery darwin/amd64 — CGO, clang -arch x86_64
          CGO_ENABLED=1 \
            CC=/usr/local/bin/cc-x86_64 \
            CGO_LDFLAGS="-L$(pwd)/tokenizers-lib/darwin-amd64" \
            GOOS=darwin GOARCH=amd64 \
            go build -tags onnx -ldflags "${LDFLAGS}" \
              -o bin/darwin_amd64/fquery ./cmd/fquery

      - name: Pack archives
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p archives

          for ARCH in arm64 amd64; do
            NAME="firememory_${VERSION}_darwin_${ARCH}"
            mkdir -p "staging/${NAME}"
            cp bin/darwin_${ARCH}/fmem   "staging/${NAME}/"
            cp bin/darwin_${ARCH}/fquery "staging/${NAME}/"
            cp ort-lib/darwin/libonnxruntime.dylib "staging/${NAME}/"
            cp LICENSE README.md "staging/${NAME}/"
            tar -czf "archives/${NAME}.tar.gz" -C staging "${NAME}"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: archives-darwin
          path: archives/

  # ── Windows: fmem + fquery (CGO via MinGW + Rust libtokenizers) ─────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install MinGW64 via MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc
          update: false
          path-type: inherit

      - name: Build libtokenizers (Windows, Rust + MinGW)
        shell: pwsh
        run: |
          git clone --depth 1 --branch v${{ env.TOKENIZERS_VERSION }} `
            https://github.com/daulet/tokenizers.git tokenizers-src

          rustup target add x86_64-pc-windows-gnu

          # tokenizers-ffi is the CGO-compatible FFI crate inside the workspace
          $gcc = (Get-Command gcc -ErrorAction Stop).Source
          Write-Host "gcc: $gcc"
          $env:CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER = $gcc
          Set-Location tokenizers-src
          cargo build --release --target x86_64-pc-windows-gnu -p tokenizers-ffi
          Set-Location ..

          # Locate the static lib (name may vary by crate version)
          $lib = Get-ChildItem -Path tokenizers-src\target -Recurse -Filter "*.a" |
                   Where-Object { $_.FullName -like "*x86_64-pc-windows-gnu*release*" -and
                                  $_.Name -notlike "*deps*" } |
                   Select-Object -First 1
          if (-not $lib) {
            Write-Error "No .a file found. Contents of target/x86_64-pc-windows-gnu/release:"
            Get-ChildItem tokenizers-src\target\x86_64-pc-windows-gnu\release -ErrorAction SilentlyContinue
            exit 1
          }
          Write-Host "Using library: $($lib.FullName)"
          New-Item -ItemType Directory -Force -Path tokenizers-lib\windows-amd64 | Out-Null
          Copy-Item $lib.FullName tokenizers-lib\windows-amd64\libtokenizers.a

      - name: Download ORT (Windows)
        shell: pwsh
        run: .\scripts\download-ort.ps1
        env:
          ORT_VERSION: ${{ env.ORT_VERSION }}

      - name: Build binaries
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME -replace '^v', ''
          $LDFLAGS  = "-s -w -X github.com/phmotad/firememory/internal/version.Version=$VERSION"
          $Root     = (Get-Location).Path

          New-Item -ItemType Directory -Force -Path bin | Out-Null

          # fmem — no CGO
          $env:GOOS = "windows"; $env:GOARCH = "amd64"; $env:CGO_ENABLED = "0"
          go build -ldflags $LDFLAGS -o bin\fmem.exe .\cmd\fmem

          # fquery — CGO via MinGW, libtokenizers linked statically
          $env:CGO_ENABLED = "1"
          $env:CC          = (Get-Command gcc -ErrorAction Stop).Source
          $env:CGO_LDFLAGS = "-L$Root\tokenizers-lib\windows-amd64 -static-libgcc -static-libstdc++ -static-libwinpthread"
          go build -tags onnx -ldflags $LDFLAGS -o bin\fquery.exe .\cmd\fquery

      - name: Pack archive
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME -replace '^v', ''
          $NAME    = "firememory_${VERSION}_windows_amd64"
          New-Item -ItemType Directory -Force -Path "archives", "staging\$NAME" | Out-Null
          Copy-Item bin\fmem.exe, bin\fquery.exe, ort-lib\onnxruntime.dll, `
                    LICENSE, README.md "staging\$NAME\"
          Compress-Archive -Path "staging\$NAME" -DestinationPath "archives\${NAME}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: archives-windows
          path: archives/

  # ── Publish release + Docker image ─────────────────────────────────────────
  release:
    needs: [build-linux, build-darwin, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: archives-linux
          path: archives/

      - uses: actions/download-artifact@v4
        with:
          name: archives-darwin
          path: archives/

      - uses: actions/download-artifact@v4
        with:
          name: archives-windows
          path: archives/

      - uses: actions/download-artifact@v4
        with:
          name: fquery-linux-amd64
          path: docker-build/

      - name: Generate SHA256SUMS
        run: |
          cd archives
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "FireMemory ${{ github.ref_name }}" \
            --generate-notes \
            archives/*

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: docker-build/
          file: Dockerfile.fquery
          push: true
          tags: |
            ghcr.io/phmotad/firequery:${{ github.ref_name }}
            ghcr.io/phmotad/firequery:latest
          build-args: |
            ORT_VERSION=${{ env.ORT_VERSION }}
          labels: |
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
            org.opencontainers.image.title=firequery
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.source=https://github.com/phmotad/firememory
