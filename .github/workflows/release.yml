name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.24"
  ORT_VERSION: "1.20.0"

jobs:
  # ── Linux: fmem (linux) + fquery (linux amd64 + arm64) ─────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install cross-compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Download ORT (linux)
        run: bash scripts/download-ort.sh
        env:
          ORT_VERSION: ${{ env.ORT_VERSION }}

      - name: Download libtokenizers (linux)
        run: bash scripts/download-tokenizers.sh

      - name: Build
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: v2.15.4
          args: build --split --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: dist/

      - uses: actions/upload-artifact@v4
        with:
          name: ort-linux
          path: ort-lib/linux/

  # ── macOS: fmem (darwin) + fquery (darwin arm64 + amd64) ───────────────────
  build-darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up clang wrapper for darwin/amd64
        run: |
          printf '#!/bin/sh\nexec clang -arch x86_64 "$@"\n' \
            > /usr/local/bin/cc-x86_64
          chmod +x /usr/local/bin/cc-x86_64

      - name: Download ORT (darwin)
        run: bash scripts/download-ort.sh
        env:
          ORT_VERSION: ${{ env.ORT_VERSION }}

      - name: Download libtokenizers (darwin)
        run: bash scripts/download-tokenizers.sh

      - name: Build
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: v2.15.4
          args: build --split --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist-darwin
          path: dist/

      - uses: actions/upload-artifact@v4
        with:
          name: ort-darwin
          path: ort-lib/darwin/

  # ── Windows: fmem only ──────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: v2.15.4
          args: build --split --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: dist/

  # ── Merge artifacts and publish release ────────────────────────────────────
  release:
    needs: [build-linux, build-darwin, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/download-artifact@v4
        with:
          name: dist-linux
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: dist-darwin
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: dist-windows
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: ort-linux
          path: ort-lib/linux/

      - uses: actions/download-artifact@v4
        with:
          name: ort-darwin
          path: ort-lib/darwin/

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Release
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: v2.15.4
          args: release --merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
