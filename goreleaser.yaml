version: 2

project_name: firememory

before:
  hooks:
    - go mod tidy

builds:
  # fmem: pure Go, no CGO. Each runner builds for its own OS in split mode.
  - id: fmem-unix
    binary: fmem
    main: ./cmd/fmem
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/phmotad/firememory/internal/version.Version={{.Version}}

  - id: fmem-windows
    binary: fmem
    main: ./cmd/fmem
    env:
      - CGO_ENABLED=0
    goos: [windows]
    goarch: [amd64]
    ldflags:
      - -s -w
      - -X github.com/phmotad/firememory/internal/version.Version={{.Version}}

  # fquery: CGO + ONNX. Linux and macOS only (separate build IDs for each OS).
  - id: fquery-linux
    binary: fquery
    main: ./cmd/fquery
    tags: [onnx]
    env:
      - CGO_ENABLED=1
      - CGO_LDFLAGS=-L./tokenizers-lib/linux-amd64
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/phmotad/firememory/internal/version.Version={{.Version}}
    overrides:
      - goos: linux
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC=aarch64-linux-gnu-gcc
          - CXX=aarch64-linux-gnu-g++
          - CGO_LDFLAGS=-L./tokenizers-lib/linux-aarch64

  - id: fquery-darwin
    binary: fquery
    main: ./cmd/fquery
    tags: [onnx]
    env:
      - CGO_ENABLED=1
      - CGO_LDFLAGS=-L./tokenizers-lib/darwin-arm64
    goos: [darwin]
    goarch: [arm64, amd64]
    ldflags:
      - -s -w
      - -X github.com/phmotad/firememory/internal/version.Version={{.Version}}
    overrides:
      - goos: darwin
        goarch: amd64
        env:
          - CGO_ENABLED=1
          - CC=/usr/local/bin/cc-x86_64
          - CGO_LDFLAGS=-L./tokenizers-lib/darwin-amd64

archives:
  # Linux + macOS: combined archive with fmem + fquery + ORT lib.
  - id: unix-archive
    builds: [fmem-unix, fquery-linux, fquery-darwin]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - src: ort-lib/{{ .Os }}/*
        dst: .
        strip_parent: true

  # Windows: fmem only (fquery is Linux/macOS only).
  - id: windows-archive
    builds: [fmem-windows]
    formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: SHA256SUMS
  algorithm: sha256

release:
  github:
    owner: phmotad
    name: firememory
  draft: false
  prerelease: auto

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

dockers:
  - id: fquery-docker
    ids: [fquery-linux]
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/phmotad/firequery:{{ .Tag }}"
      - "ghcr.io/phmotad/firequery:latest"
    dockerfile: Dockerfile.fquery
    build_flag_templates:
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title=firequery"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source=https://github.com/phmotad/firememory"
