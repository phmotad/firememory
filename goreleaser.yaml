version: 2

project_name: firememory

before:
  hooks:
    - go mod tidy

builds:
  # fmem: pure Go, no CGO — cross-compiles cleanly to all targets.
  - id: fmem
    binary: fmem
    main: ./cmd/fmem
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/phmotad/firememory/internal/version.Version={{.Version}}

  # fquery: CGO + ONNX. Por enquanto, build Linux only.
  - id: fquery
    binary: fquery
    main: ./cmd/fquery
    tags:
      - onnx
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/phmotad/firememory/internal/version.Version={{.Version}}
    overrides:
      - goos: linux
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC=aarch64-linux-gnu-gcc
          - CXX=aarch64-linux-gnu-g++

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Binary }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - src: ort-lib/*
        dst: .
        strip_parent: true

checksum:
  name_template: SHA256SUMS
  algorithm: sha256

release:
  github:
    owner: phmotad
    name: firememory
  draft: false
  prerelease: auto

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

dockers:
  - id: fquery-docker
    ids:
      - fquery
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/phmotad/firequery:{{ .Tag }}"
      - "ghcr.io/phmotad/firequery:latest"
    dockerfile: Dockerfile.fquery
    build_flag_templates:
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title=firequery"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source=https://github.com/phmotad/firememory"