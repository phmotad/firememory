version: 2

project_name: firememory

# This file is used for local snapshot builds on Linux.
# CI uses .github/workflows/release.yml with native runners per platform.
# Run locally: goreleaser release --snapshot --clean
#
# Prerequisites on Linux:
#   bash scripts/download-ort.sh
#   bash scripts/download-tokenizers.sh

before:
  hooks:
    - go mod tidy

builds:
  - id: fmem
    binary: fmem
    main: ./cmd/fmem
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/phmotad/firememory/internal/version.Version={{.Version}}

  - id: fquery
    binary: fquery
    main: ./cmd/fquery
    tags: [onnx]
    env:
      - CGO_ENABLED=1
      - CGO_LDFLAGS=-L./tokenizers-lib/linux-amd64
    goos: [linux]
    goarch: [amd64]
    ldflags:
      - -s -w
      - -X github.com/phmotad/firememory/internal/version.Version={{.Version}}

archives:
  - id: unix-archive
    builds: [fmem, fquery]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - src: ort-lib/linux/*
        dst: .
        strip_parent: true

  - id: windows-archive
    builds: [fmem]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: SHA256SUMS
  algorithm: sha256

snapshot:
  version_template: "{{ .Tag }}-next"

release:
  github:
    owner: phmotad
    name: firememory
  draft: false
  prerelease: auto

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

dockers:
  - id: fquery-docker
    ids: [fquery]
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/phmotad/firequery:{{ .Tag }}"
      - "ghcr.io/phmotad/firequery:latest"
    dockerfile: Dockerfile.fquery
    build_flag_templates:
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title=firequery"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source=https://github.com/phmotad/firememory"
