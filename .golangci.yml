run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam

linters-settings:
  goimports:
    local-prefixes: github.com/phmotad/firememory

issues:
  max-issues-per-linter: 50
  max-same-issues: 10

  exclude-rules:
    - path: "_test\\.go"
      linters:
        - unparam
        - errcheck